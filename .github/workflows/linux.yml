name: Linux

on:
  push:
    paths-ignore:
      - '.github/ISSUE_TEMPLATE/**'
      - '.gitignore'
      - '.gitattributes'
      - '**.cmd'
      - '**.md'
      - '**.rc'
      - '**.sln'
      - '**.txt'
      - '**.xml'
  pull_request:
    branches: [master]
    paths-ignore:
      - '.gitignore'
      - '.gitattributes'
      - '**.cmd'
      - '**.md'
      - '**.rc'
      - '**.sln'
      - '**.txt'
      - '**.xml'

jobs:
  Linux-Build-and-Test:
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Install build and test dependencies
      # install-deps.sh is the single source of truth for all dependencies.
      # It installs: build tools, libs, filesystem tools, ASAN runtime, cppcheck,
      # and MinGW.  See DEPENDENCIES.md for the full annotated list.
      run: sudo bash tests/install-deps.sh

    - name: Regen configure and make files
      run: aclocal && automake



    - name: Configure (Linux target)
      run: ./configure --with-os=linux

    - name: Build
      run: make -j$(nproc)

    - name: Run test suite (Linux tests only)
      run: ./run_tests.sh --linux-only

    - name: Run ASAN + UBSan test suite
      # libasan6 and libubsan1 are installed by install-deps.sh
      run: make -C tests check-asan

    - name: Run cppcheck static analysis
      continue-on-error: true
      # cppcheck is installed by install-deps.sh
      run: make -C tests check-cppcheck

    - name: Upload test binaries on failure
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: test-binaries
        path: tests/*_linux
        if-no-files-found: ignore

  Container-Full-Test:
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Build container image
      # Builds tests/Dockerfile which runs tests/install-deps.sh — all deps
      # including ASAN, cppcheck, formatting tools, and loop device utilities.
      run: docker build -t rufus-test-env tests/

    - name: Run full test suite in privileged container
      # --full-container runs: linux tests + ASAN + cppcheck + root tests.
      # Requires a privileged container for /dev/loop* loopback device access.
      run: ./run_tests.sh --full-container
